version: '3.8'

services:
  db:
    image: postgres:15
    container_name: mergeskills_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mergeskills
    ports:
      - "5433:5432"  # Isso é apenas para acesso EXTERNO (host:container)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: mergeskills_api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/mergeskills  # Use 5432 AQUI!
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data: